services:
  db:
    image: postgres:16-alpine
    container_name: prueba-tecnica-db
    environment:
      POSTGRES_USER: paula
      POSTGRES_PASSWORD: paula
      POSTGRES_DB: paula
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paula"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: prueba-tecnica-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://paula:paula@db:5432/paula
      DB_SSL: "false"
      DB_SYNC: "true"
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:?ALPHA_VANTAGE_KEY is required}
      ALPHA_VANTAGE_BASE_URL: https://www.alphavantage.co/query
      ALPHA_VANTAGE_CACHE_TTL_SECONDS: "60"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (use a long random string)}
      JWT_EXPIRES_IN: 1h
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "60"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
